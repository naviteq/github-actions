name: Checkov / Checkov

on:
  workflow_call:
    inputs:
      directory:
        description: Directory to scan
        required: false
        type: string
        default: .
      framework:
        description: Checkov framework
        required: false
        type: string
        default: all
      soft_fail:
        description: Do not fail the workflow on findings
        required: false
        type: boolean
        default: false
      check:
        description: Run only specific checks (comma separated list)
        required: false
        type: string
        default: ""
      skip_check:
        description: Skip specific checks (comma separated list)
        required: false
        type: string
        default: ""
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov Scan (${{ inputs.framework }})
    runs-on: ${{ startsWith(inputs.RUNNER, '[') && fromJSON(inputs.RUNNER) || inputs.RUNNER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@8c07e78c64ddc2209d8c193a4e321aad67677f8d # v12
        with:
          directory: ${{ inputs.directory }}
          framework: ${{ inputs.framework }}
          quiet: true
          compact: true
          soft_fail: ${{ inputs.soft_fail }}
          check: ${{ inputs.check }}
          skip_check: ${{ inputs.skip_check }}

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Checkov IaC Scan"
            echo ""
            echo "- Directory: \`${{ inputs.directory }}\`"
            echo "- Frameworks: \`${{ inputs.framework }}\`"
            echo "- Soft fail: \`${{ inputs.soft_fail }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
