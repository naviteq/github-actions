name: Helm Release Google Artifact Registry (GAR)

on:
  workflow_call:
    inputs:
      chart_path:
        description: Path to Helm chart directory (must contain Chart.yaml)
        type: string
        required: true
      gar_registry:
        description: GAR registry host
        type: string
        required: true
      gar_repo:
        description: GAR repository path
        type: string
        required: true
      gcp_workload_identity_provider:
        description: GCP Workload Identity Provider resource name (required when push_chart is true)
        type: string
        required: false
        default: ""
      gcp_service_account:
        description: GCP service account email (required when push_chart is true)
        type: string
        required: false
        default: ""
      push_chart:
        description: Push packaged chart to GAR
        type: boolean
        required: false
        default: true
      bump_version_in_git:
        description: Commit bumped chart version files to current branch
        type: boolean
        required: false
        default: true
      bump_version_git_branch:
        description: Optional branch name for bump commit target
        type: string
        required: false
        default: ""
      lint_enabled:
        description: Run helm lint before package
        type: boolean
        required: false
        default: true
      lint_values_file:
        description: Optional values file for helm lint (path is resolved from chart_path)
        type: string
        required: false
        default: ""
      chart_version:
        description: Helm chart version (overrides appVersion-derived version when provided)
        type: string
        required: false
        default: ""
      runner:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        type: string
        required: false
        default: ubuntu-24.04
    secrets:
      GITHUB_APP_ID:
        required: false
      GITHUB_APP_KEY:
        required: false
    outputs:
      chart_name:
        description: Chart name
        value: ${{ jobs.release.outputs.chart_name }}
      chart_version:
        description: Chart version
        value: ${{ jobs.release.outputs.chart_version }}
      app_version:
        description: Chart appVersion
        value: ${{ jobs.release.outputs.app_version }}
      package_file:
        description: Packaged chart file path
        value: ${{ jobs.release.outputs.package_file }}
      sha256:
        description: SHA256 checksum of package
        value: ${{ jobs.release.outputs.sha256 }}
      upload_identifier:
        description: Pushed OCI reference
        value: ${{ jobs.release.outputs.upload_identifier }}

jobs:
  release:
    runs-on: ${{ startsWith(inputs.runner, '[') && fromJSON(inputs.runner) || inputs.runner }}
    outputs:
      chart_name: ${{ steps.core.outputs.chart_name }}
      chart_version: ${{ steps.core.outputs.chart_version }}
      app_version: ${{ steps.core.outputs.app_version }}
      package_file: ${{ steps.core.outputs.package_file }}
      sha256: ${{ steps.core.outputs.sha256 }}
      upload_identifier: ${{ steps.core.outputs.upload_identifier }}
    steps:
      - name: Generate GitHub App token
        if: ${{ inputs.push_chart && inputs.bump_version_in_git }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token != '' && steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Validate GAR auth inputs
        if: ${{ inputs.push_chart }}
        env:
          WIP: ${{ inputs.gcp_workload_identity_provider }}
          SA: ${{ inputs.gcp_service_account }}
        run: |
          if [[ -z "$WIP" || -z "$SA" ]]; then
            echo "gcp_workload_identity_provider and gcp_service_account are required when push_chart=true"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: gcp_auth
        if: ${{ inputs.push_chart }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account: ${{ inputs.gcp_service_account }}

      - name: Login to GAR
        if: ${{ inputs.push_chart }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ inputs.gar_registry }}
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Run OCI core
        id: core
        uses: naviteq/github-actions/.github/actions/helm-release-oci@0fc0e34463ffda57c7a680fbd663a8de2845e93d
        with:
          chart_path: ${{ inputs.chart_path }}
          oci_registry: ${{ inputs.gar_registry }}
          oci_repo: ${{ inputs.gar_repo }}
          push_chart: ${{ inputs.push_chart }}
          bump_version_in_git: ${{ inputs.bump_version_in_git }}
          bump_version_git_branch: ${{ inputs.bump_version_git_branch }}
          lint_enabled: ${{ inputs.lint_enabled }}
          lint_values_file: ${{ inputs.lint_values_file }}
          chart_version: ${{ inputs.chart_version }}
          commit_user_name: ${{ steps.app-token.outputs.app-slug != '' && format('{0}[bot]', steps.app-token.outputs.app-slug) || github.actor }}
          commit_user_email: ${{ steps.app-token.outputs.app-slug != '' && format('{0}[bot]@users.noreply.github.com', steps.app-token.outputs.app-slug) || format('{0}@users.noreply.github.com', github.actor) }}
          commit_author: ${{ steps.app-token.outputs.app-slug != '' && format('{0}[bot] <{0}[bot]@users.noreply.github.com>', steps.app-token.outputs.app-slug) || format('{0} <{0}@users.noreply.github.com>', github.actor) }}
