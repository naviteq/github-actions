---

name: CI (Main branch)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner for the release workflow. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-24.04

jobs:
  release:
    uses: ./.github/workflows/create-release.yaml
    with:
      RUNNER: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'ubuntu-24.04' }}
    secrets:
      GITHUB_APP_ID: ${{ secrets.NAVITEQ_GITHUB_APP_ID }}
      GITHUB_APP_KEY: ${{ secrets.NAVITEQ_GITHUB_APP_KEY }}
