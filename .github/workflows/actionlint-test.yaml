name: Actionlint TEST

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  invalid-fixtures:
    name: Invalid fixtures fail
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare invalid workflow fixture
        shell: bash
        run: |
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp fixtures/actionlint/invalid-workflow.yaml .github/workflows/invalid-workflow.yaml

      - name: Run actionlint on invalid workflow fixture
        id: invalid-workflow-lint
        continue-on-error: true
        uses: devops-actions/actionlint@469810fd82c015d3c43815cd2b0e4d02eecc4819 # v0.1.11

      - name: Assert workflow lint failed
        if: ${{ steps.invalid-workflow-lint.outcome == 'success' }}
        shell: bash
        run: |
          echo "Expected actionlint to fail on the invalid workflow fixture." >&2
          exit 1

      - name: Prepare invalid local action fixture
        shell: bash
        run: |
          rm -rf .github/actions
          mkdir -p .github/actions/broken-composite
          cp fixtures/actionlint/invalid-local-action.yaml .github/actions/broken-composite/action.yaml

      - name: Run composite action lint on invalid fixture
        id: composite-action-lint
        continue-on-error: true
        uses: bettermarks/composite-action-lint@673212ed410dde8377d1d5bce860152e85064a2d # master
        with:
          actions: .github/actions/*/action.yaml

      - name: Assert composite action lint failed
        if: ${{ steps.composite-action-lint.outcome == 'success' }}
        shell: bash
        run: |
          echo "Expected composite-action-lint to fail on the invalid local action fixture." >&2
          exit 1
