---

name: Helm Release OCI TEST
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  case_core_action_success:
    name: Case - OCI core action succeeds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run OCI core action
        id: core
        uses: ./.github/actions/helm-release-oci
        with:
          chart_path: fixtures/helm-release-oci/helm-chart
          oci_registry: ghcr.io
          oci_repo: naviteq/github-actions-tests
          push_chart: "false"
          bump_version_in_git: "false"
          lint_enabled: "true"

  case_github_wrapper_success:
    name: Case - GitHub wrapper succeeds
    uses: ./.github/workflows/helm-release-github.yaml
    with:
      chart_path: fixtures/helm-release-oci/helm-chart
      ghcr_repo: ${{ github.repository }}
      push_chart: false
      bump_version_in_git: false
      lint_enabled: true

  case_ecr_wrapper_success:
    name: Case - ECR wrapper succeeds
    uses: ./.github/workflows/helm-release-ecr.yaml
    with:
      chart_path: fixtures/helm-release-oci/helm-chart
      ecr_registry: 000000000000.dkr.ecr.eu-west-1.amazonaws.com
      ecr_repo: test/charts
      push_chart: false
      bump_version_in_git: false
      lint_enabled: true

  case_gar_wrapper_success:
    name: Case - GAR wrapper succeeds
    uses: ./.github/workflows/helm-release-gar.yaml
    with:
      chart_path: fixtures/helm-release-oci/helm-chart
      gar_registry: europe-west1-docker.pkg.dev
      gar_repo: test-project/test-repo
      push_chart: false
      bump_version_in_git: false
      lint_enabled: true

  case_missing_chart_expected_failure:
    name: Case - missing chart fails
    uses: ./.github/workflows/helm-release-github.yaml
    with:
      chart_path: fixtures/helm-release-oci/missing-chart
      ghcr_repo: ${{ github.repository }}
      push_chart: false
      bump_version_in_git: false
      lint_enabled: true

  case_missing_ecr_auth_expected_failure:
    name: Case - ECR auth validation fails
    uses: ./.github/workflows/helm-release-ecr.yaml
    with:
      chart_path: fixtures/helm-release-oci/helm-chart
      ecr_registry: 000000000000.dkr.ecr.eu-west-1.amazonaws.com
      ecr_repo: test/charts
      push_chart: true
      bump_version_in_git: false
      lint_enabled: true

  assert_negative_cases_failed:
    name: Case - negative assertions
    if: ${{ always() }}
    needs:
      - case_missing_chart_expected_failure
      - case_missing_ecr_auth_expected_failure
    runs-on: ubuntu-latest
    steps:
      - name: Assert missing chart failed
        shell: bash
        run: |
          if [[ "${{ needs.case_missing_chart_expected_failure.result }}" != "failure" ]]; then
            echo "Expected helm release to fail for a missing chart path."
            exit 1
          fi
      - name: Assert ECR auth validation failed
        shell: bash
        run: |
          if [[ "${{ needs.case_missing_ecr_auth_expected_failure.result }}" != "failure" ]]; then
            echo "Expected helm release ECR wrapper to fail when auth inputs are missing."
            exit 1
          fi
