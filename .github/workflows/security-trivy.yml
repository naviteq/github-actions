name: Security / Trivy

on:
  workflow_call:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use
        required: false
        type: string
        default: ubuntu-latest
      scan_type:
        description: Trivy scan type
        required: false
        type: string
        default: image
        # Supported values: image, fs
      image_ref:
        description: Image reference to scan when scan_type=image
        required: false
        type: string
        default: ""
      scan_ref:
        description: Path to scan when scan_type=fs
        required: false
        type: string
        default: "."
      registry:
        description: Container registry hostname for image scans
        required: false
        type: string
        default: ""
      registry_username:
        description: Registry username for image scans
        required: false
        type: string
        default: ""
    secrets:
      registry_password:
        required: false

  workflow_dispatch:
    inputs:
      scan_type:
        description: Trivy scan type
        required: false
        type: choice
        default: image
        options:
          - image
          - fs
      image_ref:
        description: Image reference to scan when scan_type=image
        required: false
        type: string
        default: ""
      scan_ref:
        description: Path to scan when scan_type=fs
        required: false
        type: string
        default: "."
      registry:
        description: Container registry hostname for image scans
        required: false
        type: string
        default: ""
      registry_username:
        description: Registry username for image scans
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  trivy:
    name: Container Scan
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}
    env:
      REGISTRY_PASSWORD: ${{ secrets.registry_password }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        if: ${{ inputs.scan_type == 'image' && inputs.registry != '' && inputs.registry_username != '' && env.REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Run Trivy image scan
        if: ${{ inputs.scan_type == 'image' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: os,library
          scanners: vuln

      - name: Run Trivy filesystem scan
        if: ${{ inputs.scan_type == 'fs' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan_ref }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
          scanners: vuln