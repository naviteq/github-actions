name: Security / Trivy

on:
  workflow_call:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-latest
      scan_type:
        description: Trivy scan type
        required: false
        type: string
        default: image
      image_ref:
        description: Image reference to scan when scan_type=image
        required: false
        type: string
        default: ""
      scan_ref:
        description: Path to scan when scan_type=fs
        required: false
        type: string
        default: "."
      registry:
        description: Container registry hostname for image scans
        required: false
        type: string
        default: ""
      registry_username:
        description: Registry username for image scans
        required: false
        type: string
        default: ""
    secrets:
      registry_password:
        required: false

  workflow_dispatch:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-latest
      scan_type:
        description: Trivy scan type
        required: false
        type: choice
        default: image
        options:
          - image
          - fs
      image_ref:
        description: Image reference to scan when scan_type=image
        required: false
        type: string
        default: ""
      scan_ref:
        description: Path to scan when scan_type=fs
        required: false
        type: string
        default: "."
      registry:
        description: Container registry hostname for image scans
        required: false
        type: string
        default: ""
      registry_username:
        description: Registry username for image scans
        required: false
        type: string
        default: ""

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Container Scan
    runs-on: ${{ startsWith(inputs.RUNNER, '[') && fromJSON(inputs.RUNNER) || inputs.RUNNER || 'ubuntu-latest' }}
    env:
      REGISTRY_PASSWORD: ${{ secrets.registry_password }}

    steps:
      - uses: actions/checkout@v6

      - name: Log in to container registry
        if: ${{ inputs.scan_type == 'image' && inputs.registry != '' && inputs.registry_username != '' && env.REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Run Trivy image scan (JSON)
        if: ${{ inputs.scan_type == 'image' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: false
          vuln-type: os,library
          scanners: vuln
          hide-progress: true

      - name: Run Trivy filesystem scan (JSON)
        if: ${{ inputs.scan_type == 'fs' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan_ref }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: false
          scanners: vuln
          hide-progress: true

      - name: Run Trivy image scan (SARIF)
        if: ${{ inputs.scan_type == 'image' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          format: sarif
          output: trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: false
          vuln-type: os,library
          scanners: vuln
          hide-progress: true

      - name: Run Trivy filesystem scan (SARIF)
        if: ${{ inputs.scan_type == 'fs' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan_ref }}
          format: sarif
          output: trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: false
          scanners: vuln
          hide-progress: true

      - name: Run Trivy image scan (text summary)
        if: ${{ inputs.scan_type == 'image' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          output: trivy.txt
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: os,library
          scanners: vuln
          hide-progress: true

      - name: Run Trivy filesystem scan (text summary)
        if: ${{ inputs.scan_type == 'fs' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan_ref }}
          output: trivy.txt
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
          scanners: vuln
          hide-progress: true

      - name: Upload SARIF to GitHub Security
        if: ${{ always() && hashFiles('trivy-report.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-report.sarif

      - name: Publish Trivy Output to Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Trivy Scan Results"

            if [ "${{ inputs.scan_type }}" = "image" ]; then
              echo "- **Scan type:** image"
              echo "- **Target:** \`${{ inputs.image_ref }}\`"
            else
              echo "- **Scan type:** fs"
              echo "- **Target:** \`${{ inputs.scan_ref }}\`"
            fi

            if [ ! -f trivy-report.json ]; then
              echo ""
              echo "No Trivy JSON report was generated."
              exit 1
            fi

            CRITICAL_COUNT=$(jq '[.. | objects | select(has("Severity")) | select(.Severity == "CRITICAL")] | length' trivy-report.json)
            HIGH_COUNT=$(jq '[.. | objects | select(has("Severity")) | select(.Severity == "HIGH")] | length' trivy-report.json)

            echo "- **Critical vulnerabilities:** ${CRITICAL_COUNT}"
            echo "- **High vulnerabilities:** ${HIGH_COUNT}"
            echo ""

            if [[ -s trivy.txt ]]; then
              echo "### Security Output"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```text'
              cat trivy.txt
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
