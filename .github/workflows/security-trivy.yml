name: Security / Trivy (Container)

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image_ref:
        description: Local image reference to scan
        required: false
        type: string
        default: security-trivy:test
  workflow_dispatch:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image_ref:
        description: Local image reference to scan
        required: false
        type: string
        default: security-trivy:test

permissions:
  contents: read

jobs:
  trivy:
    name: Container Scan
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: "0.56.1"

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f "${{ inputs.dockerfile }}" -t "${{ inputs.image_ref }}" "${{ inputs.context }}"

      - name: Install Trivy
        shell: bash
        run: |
          set -euo pipefail

          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ASSET_ARCH="64bit" ;;
            aarch64|arm64) ASSET_ARCH="ARM64" ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac

          OS="Linux"
          DEB="trivy_${TRIVY_VERSION}_${OS}-${ASSET_ARCH}.deb"
          URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${DEB}"

          echo "Downloading ${URL}"
          curl -fsSL "${URL}" -o "${DEB}"
          sudo dpkg -i "${DEB}"
          trivy --version

      - name: Run Trivy scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed=false \
            --vuln-type os,library \
            "${{ inputs.image_ref }}"