name: Security / Trivy (Container)

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image_ref:
        description: Local image reference to scan
        required: false
        type: string
        default: security-trivy:test
  workflow_dispatch:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image_ref:
        description: Local image reference to scan
        required: false
        type: string
        default: security-trivy:test

permissions:
  contents: read

jobs:
  trivy:
    name: Container Scan
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: "0.56.1"

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f "${{ inputs.dockerfile }}" -t "${{ inputs.image_ref }}" "${{ inputs.context }}"

      - name: Install Trivy
        shell: bash
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
          trivy --version

      - name: Run Trivy scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed=false \
            --vuln-type os,library \
            "${{ inputs.image_ref }}"