name: Security / Trivy

on:
  workflow_call:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use
        required: false
        type: string
        default: ubuntu-latest
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image_ref:
        description: Local image reference to scan
        required: false
        type: string
        default: security-trivy:test
  workflow_dispatch:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        required: false
        type: string
        default: .
      image_ref:
        description: Local image reference to scan
        required: false
        type: string
        default: security-trivy:test

permissions:
  contents: read

jobs:
  trivy:
    name: Container Scan
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          tags: ${{ inputs.image_ref }}
          load: true
          push: false

      - name: Run Trivy scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.2 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed=false \
            --pkg-types os,library \
            --scanners vuln \
            --skip-version-check \
            "${{ inputs.image_ref }}"