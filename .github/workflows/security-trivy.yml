name: Security / Trivy

on:
  workflow_call:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use
        required: false
        type: string
        default: ubuntu-latest
      scan_type:
        description: Trivy scan type
        required: false
        type: string
        default: image
        # Supported values: image, fs
      image_ref:
        description: Local image reference to scan when scan_type=image
        required: false
        type: string
        default: security-trivy:test
      scan_ref:
        description: Path to scan when scan_type=fs
        required: false
        type: string
        default: .
  workflow_dispatch:
    inputs:
      scan_type:
        description: Trivy scan type
        required: false
        type: choice
        default: image
        options:
          - image
          - fs
      image_ref:
        description: Local image reference to scan when scan_type=image
        required: false
        type: string
        default: security-trivy:test
      scan_ref:
        description: Path to scan when scan_type=fs
        required: false
        type: string
        default: .

permissions:
  contents: read

jobs:
  trivy:
    name: Container Scan
    runs-on: ${{ inputs.RUNNER || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy image scan
        if: ${{ inputs.scan_type == 'image' }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.2 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed=false \
            --pkg-types os,library \
            --scanners vuln \
            --skip-version-check \
            "${{ inputs.image_ref }}"

      - name: Run Trivy filesystem scan
        if: ${{ inputs.scan_type == 'fs' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.69.2 fs \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed=false \
            --scanners vuln \
            --skip-version-check \
            "${{ inputs.scan_ref }}"