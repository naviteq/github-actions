name: Security / Scan Suite Runner

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Default GitHub Actions runner for all scanners
        required: false
        type: string
        default: ubuntu-latest
      codeql_language:
        description: CodeQL language to scan
        required: true
        type: choice
        default: python
        options:
          - python
          - javascript
          - java
          - csharp
          - go
          - ruby
          - cpp
          - swift
      trivy_scan_type:
        description: Trivy scan type
        required: false
        type: choice
        default: image
        options:
          - image
          - fs
      trivy_image_ref:
        description: Container image reference for Trivy image scans
        required: false
        type: string
        default: cgr.dev/chainguard/nginx:latest
      trivy_registry:
        description: Container registry hostname for image scans
        required: false
        type: string
        default: ""
      trivy_registry_username:
        description: Registry username for image scans
        required: false
        type: string
        default: ""
      trivy_scan_ref:
        description: Path for Trivy filesystem scans
        required: false
        type: string
        default: .
      checkov_directory:
        description: Directory to scan with Checkov
        required: false
        type: string
        default: .github/testdata/security-checkov
      checkov_framework:
        description: Checkov frameworks (comma separated list)
        required: false
        type: string
        default: terraform,kubernetes,helm
      checkov_soft_fail:
        description: Do not fail Checkov on findings
        required: false
        type: boolean
        default: true
      checkov_check:
        description: Run only specific Checkov checks
        required: false
        type: string
        default: ""
      checkov_skip_check:
        description: Skip specific Checkov checks
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security-scan-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/security-scan.yml
    with:
      runner: ${{ inputs.runner }}
      codeql_language: ${{ inputs.codeql_language }}
      trivy_scan_type: ${{ inputs.trivy_scan_type }}
      trivy_image_ref: ${{ inputs.trivy_image_ref }}
      trivy_registry: ${{ inputs.trivy_registry }}
      trivy_registry_username: ${{ inputs.trivy_registry_username }}
      trivy_scan_ref: ${{ inputs.trivy_scan_ref }}
      checkov_directory: ${{ inputs.checkov_directory }}
      checkov_framework: ${{ inputs.checkov_framework }}
      checkov_soft_fail: ${{ inputs.checkov_soft_fail }}
      checkov_check: ${{ inputs.checkov_check }}
      checkov_skip_check: ${{ inputs.checkov_skip_check }}

  security-scan-push:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/security-scan.yml
    with:
      runner: ubuntu-latest
      codeql_language: python
      trivy_scan_type: image
      trivy_image_ref: cgr.dev/chainguard/nginx:latest
      trivy_scan_ref: .
      checkov_directory: .github/testdata/iac-security-scan
      checkov_framework: terraform,kubernetes,helm
      checkov_soft_fail: true
      checkov_check: ""
      checkov_skip_check: ""
