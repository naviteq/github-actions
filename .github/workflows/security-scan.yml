name: Security / Scan Suite

on:
  workflow_call:
    inputs:
      runner:
        description: Default GitHub Actions runner for all scanners
        required: false
        type: string
        default: ubuntu-latest
      codeql_runner:
        description: GitHub Actions runner for CodeQL
        required: false
        type: string
        default: ""
      codeql_language:
        description: CodeQL language to scan
        required: true
        type: string
      dependency_review_runner:
        description: GitHub Actions runner for Dependency Review
        required: false
        type: string
        default: ""
      gitleaks_runner:
        description: GitHub Actions runner for Gitleaks
        required: false
        type: string
        default: ""
      trivy_runner:
        description: GitHub Actions runner for Trivy
        required: false
        type: string
        default: ""
      trivy_scan_type:
        description: Trivy scan type
        required: false
        type: string
        default: image
      trivy_image_ref:
        description: Container image reference for Trivy image scans
        required: false
        type: string
        default: ""
      trivy_scan_ref:
        description: Path for Trivy filesystem scans
        required: false
        type: string
        default: .
      trivy_registry:
        description: Container registry hostname for image scans
        required: false
        type: string
        default: ""
      trivy_registry_username:
        description: Registry username for image scans
        required: false
        type: string
        default: ""
      checkov_directory:
        description: Directory to scan with Checkov
        required: false
        type: string
        default: .
      checkov_runner:
        description: GitHub Actions runner for Checkov
        required: false
        type: string
        default: ""
      checkov_framework:
        description: Checkov frameworks (comma separated list)
        required: false
        type: string
        default: terraform,kubernetes,helm
      checkov_soft_fail:
        description: Do not fail Checkov on findings
        required: false
        type: boolean
        default: false
      checkov_check:
        description: Run only specific Checkov checks
        required: false
        type: string
        default: ""
      checkov_skip_check:
        description: Skip specific Checkov checks
        required: false
        type: string
        default: ""
    secrets:
      trivy_registry_password:
        required: false
permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    uses: naviteq/github-actions/.github/workflows/security-codeql.yml@main
    with:
      RUNNER: ${{ inputs.codeql_runner != '' && inputs.codeql_runner || inputs.runner }}
      language: ${{ inputs.codeql_language }}

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' || github.event_name == 'merge_group' }}
    uses: naviteq/github-actions/.github/workflows/security-dependency-review.yml@main
    with:
      RUNNER: ${{ inputs.dependency_review_runner != '' && inputs.dependency_review_runner || inputs.runner }}

  gitleaks:
    name: Gitleaks
    uses: naviteq/github-actions/.github/workflows/security-gitleaks.yml@main
    with:
      RUNNER: ${{ inputs.gitleaks_runner != '' && inputs.gitleaks_runner || inputs.runner }}

  trivy:
    name: Trivy
    uses: naviteq/github-actions/.github/workflows/security-trivy.yml@main
    with:
      RUNNER: ${{ inputs.trivy_runner != '' && inputs.trivy_runner || inputs.runner }}
      scan_type: ${{ inputs.trivy_scan_type }}
      image_ref: ${{ inputs.trivy_image_ref }}
      scan_ref: ${{ inputs.trivy_scan_ref }}
      registry: ${{ inputs.trivy_registry }}
      registry_username: ${{ inputs.trivy_registry_username }}
    secrets:
      registry_password: ${{ secrets.trivy_registry_password }}

  checkov:
    name: Checkov
    uses: naviteq/github-actions/.github/workflows/security-checkov.yaml@main
    with:
      RUNNER: ${{ inputs.checkov_runner != '' && inputs.checkov_runner || inputs.runner }}
      directory: ${{ inputs.checkov_directory }}
      framework: ${{ inputs.checkov_framework }}
      soft_fail: ${{ inputs.checkov_soft_fail }}
      check: ${{ inputs.checkov_check }}
      skip_check: ${{ inputs.checkov_skip_check }}
