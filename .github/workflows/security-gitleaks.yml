name: Security / Gitleaks (Secrets)

on:
  workflow_call:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-latest
  workflow_dispatch:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ${{ startsWith(inputs.RUNNER, '[') && fromJSON(inputs.RUNNER) || inputs.RUNNER }}
    env:
      GITLEAKS_VERSION: "8.30.0"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail

          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ASSET_ARCH="x64" ;;
            aarch64|arm64) ASSET_ARCH="arm64" ;;
            armv7l) ASSET_ARCH="armv7" ;;
            armv6l) ASSET_ARCH="armv6" ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac

          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ASSET="gitleaks_${GITLEAKS_VERSION}_${OS}_${ASSET_ARCH}.tar.gz"
          CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          echo "Downloading ${BASE_URL}/${ASSET}"
          curl -fsSL "${BASE_URL}/${ASSET}" -o "${ASSET}"
          curl -fsSL "${BASE_URL}/${CHECKSUMS}" -o "${CHECKSUMS}"

          grep " ${ASSET}$" "${CHECKSUMS}" > "${ASSET}.sha256"
          sha256sum -c "${ASSET}.sha256"

          tar -xzf "${ASSET}"
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

          gitleaks version

      - name: Run Gitleaks scan
        run: |
          gitleaks git --verbose --report-format json --report-path gitleaks-report.json || true

      - name: Publish results to GitHub Summary
        shell: bash
        run: |
          {
            echo "## 🔐 Gitleaks Secret Scan Results"

            if jq -e 'length > 0' gitleaks-report.json > /dev/null; then
              echo "Secrets were detected. See details below:"
              echo '```json'
              cat gitleaks-report.json
              echo '```'
            else
              echo "✅ No secrets detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if jq -e 'length > 0' gitleaks-report.json > /dev/null; then
            exit 1
          fi
