---

name: Helm release
on:
  workflow_call:
    inputs:
      CHART_LOCATION:
        type: string
      UPDATE_BRANCH:
        type: string
      ENVIRONMENT:
        type: string
      PUSH_TO_GITHUB:
        type: boolean
        default: false
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        type: string
        required: false
        default: ubuntu-24.04
    secrets:
      TOKEN:
        required: true

jobs:
  helm:
    name: Update Chart.yaml file for version\appVersion and build
    runs-on: ${{ startsWith(inputs.RUNNER, '[') && fromJSON(inputs.RUNNER) || inputs.RUNNER }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for tags
          ref: ${{ github.head_ref }}
          token: ${{ secrets.TOKEN }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.18.3

      - name: Lint Helm chart
        working-directory: ${{ inputs.CHART_LOCATION }}
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
        run: |
          if [[ -n "$ENVIRONMENT" ]]
          then
            helm lint -f values/$ENVIRONMENT.yaml
          else
            helm lint .
          fi

      - name: Checkout Helm repo museum
        if: ${{ github.ref_type == 'tag' && inputs.PUSH_TO_GITHUB }}
        uses: actions/checkout@v6
        with:
          repository: naviteq/helm-charts
          path: helm-charts
          token: ${{ secrets.TOKEN }}

      - name: Update versions
        working-directory: ${{ inputs.CHART_LOCATION }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "branch" ]]
          then
            LATEST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1))
            APP_VERSION="$LATEST_TAG-pre+$(echo ${GITHUB_SHA} | cut -c1-7)" 
          else
            APP_VERSION="${GITHUB_REF_NAME##*/}"
          fi
          echo "Updating Chart.yaml"
          sed -i "s#^version:.*#version: ${APP_VERSION/v/}#g" Chart.yaml
          sed -i "s#^appVersion:.*#appVersion: ${APP_VERSION}#g" Chart.yaml
          cat Chart.yaml

      - name: Build Helm chart
        if: ${{ github.ref_type == 'tag' && inputs.PUSH_TO_GITHUB }}
        run: |
          helm package ${{ inputs.CHART_LOCATION }}
          mv *.tgz helm-charts

      - name: Publish Helm charts
        if: ${{ github.ref_type == 'tag' && inputs.PUSH_TO_GITHUB }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: helm-charts
          commit_message: "Updated from CI"
          file_pattern: "*.tgz"

      - name: Commit file to branch
        if: ${{ github.ref_type == 'tag' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Bumped up version and appVersion [skip ci]"
          branch: ${{ inputs.UPDATE_BRANCH }}
          file_pattern: "**/*.yaml"
