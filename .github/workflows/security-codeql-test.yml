name: Security / CodeQL (SAST) TEST

on:
  workflow_call:
    inputs:
      language:
        description: CodeQL language to scan
        required: false
        type: string
        default: python
  workflow_dispatch:
    inputs:
      language:
        description: CodeQL language to scan
        required: true
        default: python
        type: choice
        options:
          - python
          - javascript
          - java
          - csharp
          - go
          - ruby
          - cpp
          - swift

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: Case - codeql analyze succeeds
    uses: ./.github/workflows/security-codeql.yml
    with:
      language: ${{ inputs.language || 'python' }}
