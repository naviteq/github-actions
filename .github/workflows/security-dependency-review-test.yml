name: Security / Dependency Review (SCA) TEST

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Case - dependency review succeeds
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/security-dependency-review.yml

  dependency-review-context:
    name: Case - non-PR context is documented
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped execution
        shell: bash
        run: |
          {
            echo "## Dependency Review Test"
            echo ""
            echo "Skipped functional execution because dependency-review-action requires pull request diff context."
          } >> "$GITHUB_STEP_SUMMARY"
