name: Security / CodeQL (SAST)

on:
  workflow_call:
    inputs:
      RUNNER:
        description: GitHub Actions runner to use. Supports a single label or a JSON array of labels.
        required: false
        type: string
        default: ubuntu-latest
      language:
        description: CodeQL language to scan
        required: true
        type: string
        # Available CodeQL languages:
        # python
        # javascript
        # java
        # csharp
        # go
        # ruby
        # cpp
        # swift

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ inputs.language }})
    runs-on: ${{ startsWith(inputs.RUNNER, '[') && fromJSON(inputs.RUNNER) || inputs.RUNNER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          languages: ${{ inputs.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@38697555549f1db7851b81482ff19f1fa5c4fedc # v4

      - name: Analyze
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
